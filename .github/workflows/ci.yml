name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Aligned with deploy.yml: wrangler 4.x requires Node >= 22.
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: node --check scripts/smoke.mjs
      - run: node --check scripts/live-test.mjs
